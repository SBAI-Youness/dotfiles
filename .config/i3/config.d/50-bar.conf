bar {
  id mybar

  # Bar color configuration
  colors {

    # Background color of the entire bar
    background #000000

    # Color of the status text (clock, network, etc.)
    statusline #FFFFFF

    # Color of separators between modules
    separator  #666666

    # Workspace colors (focused workspace)
    # Active workspace currently in use
    focused_workspace  #83CAFA #51A2DA #FFFFFF
    # Workspace that has focus but is not active (rare state depending on config)
    active_workspace   #3C6EB4 #294172 #FFFFFF
    # Workspaces that are not currently selected
    inactive_workspace #8C8C8C #4C4C4C #888888
    # Workspace that has urgent notifications
    urgent_workspace   #EC69A0 #DB3279 #FFFFFF
    # Workspace shown when in a special binding mode (resize, etc.)
    binding_mode       #b691d3 #A07CBC #FFFFFF
  }

  # Status script used to populate the bar (i3status config file)
  status_command i3status -c ~/.config/i3/i3status.conf
}