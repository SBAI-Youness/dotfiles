# Volume controls with refresh of i3status


# Command used to refresh i3status after volume changes
set $refresh_i3status killall -SIGUSR1 i3status


# Use modular scripts for audio controls
# Increase system volume and refresh i3status
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/audio/volume_up.sh && $refresh_i3status
# Decrease system volume and refresh i3status
bindsym XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/audio/volume_down.sh && $refresh_i3status
# Toggle audio mute state and refresh i3status
bindsym XF86AudioMute exec --no-startup-id ~/.config/i3/scripts/audio/mute_toggle.sh && $refresh_i3status
# Toggle microphone mute state and refresh i3status
bindsym XF86AudioMicMute exec --no-startup-id ~/.config/i3/scripts/audio/mic_toggle.sh && $refresh_i3status

# Media keys using playerctl
# Play or pause media playback
bindsym XF86AudioPlay exec --no-startup-id playerctl play-pause
# Skip to the next media track
bindsym XF86AudioNext exec --no-startup-id playerctl next
# Go back to the previous media track
bindsym XF86AudioPrev exec --no-startup-id playerctl previous


# Brightness controls
# Increase screen brightness by 15%
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set +15%
# Decrease screen brightness by 15%
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 15%-


# Screenshots
# Take a full-screen screenshot, copy it to clipboard, and save it
bindsym Print exec --no-startup-id flameshot full -c -p ~/Pictures/screenshots
# Open Flameshot GUI for area selection, copy to clipboard, and save it 
bindsym Shift+Print exec --no-startup-id flameshot gui -c -p ~/Pictures/screenshots
# Open Flameshot GUI for area selection and copy only to clipboard
bindsym Ctrl+Print exec --no-startup-id flameshot gui -c


# Window management keys (focus, move, split, fullscreen, layouts)
# Change window focus using vim-style keys
bindsym $mod+j focus left
bindsym $mod+k focus down
bindsym $mod+l focus up
bindsym $mod+m focus right
# Alternative focus movement using arrow keys
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right
# Move the focused window using vim-style keys
bindsym $mod+Shift+j move left
bindsym $mod+Shift+k move down
bindsym $mod+Shift+l move up
bindsym $mod+Shift+m move right
# Alternative window movement using arrow keys
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right
# Split the current container horizontally
bindsym $mod+h split h
# Split the current container vertically
bindsym $mod+v split v
# Toggle fullscreen mode for the focused window
bindsym $mod+f fullscreen toggle
# Set stacked layout
bindsym $mod+s layout stacking
# Set tabbed layout
bindsym $mod+z layout tabbed
# Toggle between split layouts
bindsym $mod+e layout toggle split
# Toggle floating mode for the focused window
bindsym $mod+Shift+space floating toggle
# Switch focus between tiling and floating windows
bindsym $mod+space focus mode_toggle
# Launch Boomer screen magnifier
# Thank you tsoding for this beautiful zoomer app for linux
bindsym $mod+b exec "boomer"
# Focus the parent container
bindsym $mod+q focus parent
# kill focused window
bindsym $mod+Shift+q kill
# Resize mode configuration
# Allows interactive resizing of windows
mode "resize" {
        # Resize window width/height using vim-style keys
        bindsym j resize shrink width 10 px or 10 ppt
        bindsym k resize grow height 10 px or 10 ppt
        bindsym l resize shrink height 10 px or 10 ppt
        bindsym m resize grow width 10 px or 10 ppt

        # Resize window width/height using arrow keys
        bindsym Left resize shrink width 10 px or 10 ppt
        bindsym Down resize grow height 10 px or 10 ppt
        bindsym Up resize shrink height 10 px or 10 ppt
        bindsym Right resize grow width 10 px or 10 ppt

        # Exit resize mode using Enter, Escape, or Mod+r
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}
# Enter resize mode
bindsym $mod+r mode "resize"


# Launch terminal, browser, and other applications
# Launch Firefox browser
bindsym $mod+Shift+Return exec firefox
# Launch Kitty terminal
bindsym $mod+Return exec kitty
# Launch VMware
bindsym $mod+Shift+v exec vmware
# Launch Thunar file manager
bindsym $mod+Shift+t exec thunar
# Launch OBS Studio
bindsym $mod+Shift+o exec obs
# Launch Discord
bindsym $mod+Shift+d exec discord
# Launch Spotify
bindsym $mod+Shift+s exec spotify
# Application launcher using Rofi
bindsym $mod+d exec rofi -show drun


# Lock the screen using the custom lock script
bindsym $mod+shift+x exec "~/.config/i3/scripts/display/lock.sh"


# Toggle screenkey utility for displaying pressed keys on screen
bindsym $mod+Ctrl+k exec --no-startup-id "~/.config/i3/scripts/utilities/toggle_screenkey.sh"


# Hold Mod key and drag floating windows with the mouse
floating_modifier $mod


# Reload the i3 configuration file
bindsym $mod+Shift+c reload
# Restart i3 in-place while preserving the current session/layout
bindsym $mod+Shift+r restart


# Launch interactive power menu
bindsym $mod+Shift+e exec "~/.config/i3/scripts/power/power_menu.sh"


# Launch display configuration/monitor chooser script
bindsym $mod+Shift+p exec --no-startup-id "~/.config/i3/scripts/display/display.sh"